<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Daftar Hadir Wali Santri</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Styling KOP (Hanya Muncul di Cetak) */
        .kop-surat {
            display: none; 
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px double #000;
            padding-bottom: 10px;
        }

        .kop-surat h2 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .kop-surat h1 { margin: 5px 0; font-size: 22px; }
        .kop-surat p { margin: 0; font-size: 14px; font-style: italic; }

        /* Bagian Kontrol (Filter & Cetak) */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group { display: flex; gap: 8px; align-items: center; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-filter { background-color: #ecf0f1; color: var(--primary-color); border: 1px solid #bdc3c7; }
        .btn-filter.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        .btn-download { background-color: var(--success-color); color: white; }

        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: var(--primary-color); color: white; text-align: left; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-pprs { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .badge-pprm { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* ATURAN CETAK (PRINT) */
        @media print {
            @page { size: landscape; margin: 1cm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
            .controls { display: none !important; } 
            
            .kop-surat { display: block !important; } 
            
            table { font-size: 11px; width: 100%; }
            th, td { border: 1px solid #000 !important; padding: 6px; }
            th { background-color: #eee !important; color: black !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="kop-surat">
        <h2>REKAP DAFTAR HADIR RAPAT WALI SANTRI</h2>
        <h1>PP RIYADLUS SHOLIHIN - PP ROUDLATUL MALIKIYAH</h1>
        <p>Ketapang - Kademangan - Kota Probolinggo</p>
    </div>

    <div class="controls">
        <div class="filter-group">
            <strong>Lembaga:</strong>
            <button class="btn btn-filter active" onclick="filterTable('ALL', this)">Semua</button>
            <button class="btn btn-filter" onclick="filterTable('PPRS', this)">PPRS</button>
            <button class="btn btn-filter" onclick="filterTable('PPRM', this)">PPRM</button>
        </div>
        
        <button class="btn btn-download" onclick="window.print()">
            🖨️ Cetak / Simpan PDF
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Lembaga</th>
                    <th>Nama Santri</th>
                    <th>Nama Wali</th>
                    <th>Alamat</th>
                    <th>No. WA</th>
                    <th>Asrama</th>
                    <th>Diniyah</th>
                    <th>Formal</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="9" style="text-align:center; padding:20px;">Memuat data santri...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxMnohyI7aZILimL7G6UIoGgxtxDnXuFNDoXVoBCV8vrKQR_DLRDXotKPJau0fUcgKKjA/exec';

    document.addEventListener('DOMContentLoaded', fetchData);

    async function fetchData() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const rows = data.slice(1).filter(r => r[0] !== "" && r[1] !== "");
            displayData(rows);
        } catch (error) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="9" style="text-align:center; color:red; padding:20px;">Gagal memuat data. Periksa koneksi atau izin Apps Script.</td></tr>`;
        }
    }

    function displayData(dataArray) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ''; 
        dataArray.forEach(row => {
            const tr = document.createElement('tr');
            const lembaga = (row[1] || '').toString().toUpperCase();
            const badgeClass = lembaga === 'PPRS' ? 'badge-pprs' : (lembaga === 'PPRM' ? 'badge-pprm' : '');

            tr.innerHTML = `
                <td>${row[0] || '-'}</td>
                <td><span class="badge ${badgeClass}">${row[1] || '-'}</span></td>
                <td><strong>${row[2] || '-'}</strong></td>
                <td>${row[3] || '-'}</td>
                <td>${row[4] || '-'}</td>
                <td>${row[5] || '-'}</td>
                <td>${row[6] || '-'}</td>
                <td>${row[7] || '-'}</td>
                <td>${row[8] || '-'}</td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function filterTable(kategori, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            const textLembaga = row.cells[1].textContent.trim().toUpperCase();
            row.style.display = (kategori === 'ALL' || textLembaga === kategori) ? "" : "none";
        });
    }
</script>

</body>
</html>
